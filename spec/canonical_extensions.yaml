# Cooklang Canonical Extensions
# 
# These are extended syntax features documented in the official Cooklang specification
# at https://cooklang.org/docs/spec/ under the "Advanced" section, but not yet included
# in the canonical.yaml test suite from the official spec repository.
#
# Features covered:
# - Block comments [- comment -]
# - Sections (= Section Name =)
# - Notes (> note text)
#
# Note: These tests reflect the current parser behavior. Single newlines are converted
# to spaces and combine content into the same step. Double newlines (blank lines) 
# separate content into different steps.

version: 1
tests:
  # ==========================================
  # Block Comments [- comment -]
  # ==========================================

  testBlockCommentSimple:
    source: |
      [- This is a block comment -]
    result:
      steps:
        -
          - type: blockComment
            value: "This is a block comment"
      metadata: {}

  testBlockCommentInline:
    source: |
      Add @salt{1%tsp} [- adjust to taste -] and stir.
    result:
      steps:
        -
          - type: text
            value: "Add "
          - type: ingredient
            name: "salt"
            quantity: 1
            units: "tsp"
          - type: text
            value: " "
          - type: blockComment
            value: "adjust to taste"
          - type: text
            value: " and stir."
      metadata: {}

  testBlockCommentEmpty:
    source: |
      [--]
    result:
      steps:
        -
          - type: blockComment
            value: ""
      metadata: {}

  testBlockCommentWithSpecialCharacters:
    source: |
      [- Comment with @special #characters ~inside -]
    result:
      steps:
        -
          - type: blockComment
            value: "Comment with @special #characters ~inside"
      metadata: {}

  # ==========================================
  # Sections = Section Name =
  # ==========================================

  testSectionSimple:
    source: |
      = Preparation =
    result:
      steps:
        -
          - type: section
            name: "Preparation"
      metadata: {}

  # Section followed by content on next line combines into single step
  # (single newline converts to space and joins them)
  testSectionWithContent:
    source: |
      = Dough =
      Mix @flour{500%g} with @water{300%ml}.
    result:
      steps:
        -
          - type: section
            name: "Dough"
          - type: text
            value: " Mix "
          - type: ingredient
            name: "flour"
            quantity: 500
            units: "g"
          - type: text
            value: " with "
          - type: ingredient
            name: "water"
            quantity: 300
            units: "ml"
          - type: text
            value: "."
      metadata: {}

  # Sections separated by blank lines are in different steps
  # Section and its following content (single newline) are combined
  testMultipleSections:
    source: |
      = First Section =
      Do something.

      = Second Section =
      Do something else.
    result:
      steps:
        -
          - type: section
            name: "First Section"
          - type: text
            value: " Do something."
        -
          - type: section
            name: "Second Section"
          - type: text
            value: " Do something else."
      metadata: {}

  testSectionNoTrailingEquals:
    source: |
      = Just a Header
    result:
      steps:
        -
          - type: section
            name: "Just a Header"
      metadata: {}

  # ==========================================
  # Notes > note text
  # ==========================================

  testNoteSimple:
    source: |
      > This is a helpful tip for the recipe.
    result:
      steps:
        -
          - type: note
            value: "This is a helpful tip for the recipe."
      metadata: {}

  # Note followed by blank line and content creates separate steps
  testNoteWithContentAfter:
    source: |
      > Chef's tip: let the dough rest.

      Now knead the @dough{}.
    result:
      steps:
        -
          - type: note
            value: "Chef's tip: let the dough rest."
        -
          - type: text
            value: "Now knead the "
          - type: ingredient
            name: "dough"
            quantity: "some"
            units: ""
          - type: text
            value: "."
      metadata: {}

  # Consecutive notes (single newline) get combined into one note
  testNoteMultipleConsecutive:
    source: |
      > First note line.
      > Second note line continues the thought.
    result:
      steps:
        -
          - type: note
            value: "First note line. Second note line continues the thought."
      metadata: {}

  testNoteWithSpecialCharacters:
    source: |
      > Note with @symbol and #hash but not parsed as ingredients.
    result:
      steps:
        -
          - type: note
            value: "Note with @symbol and #hash but not parsed as ingredients."
      metadata: {}

  # ==========================================
  # Combined Extended Features
  # ==========================================

  # Section followed by note on next line creates section with trailing space
  # then note is in its own step due to how notes work
  testSectionWithNotes:
    source: |
      = Making the Sauce =
      > This sauce is best made the day before.

      Simmer @tomatoes{400%g} in #pot{}.
    result:
      steps:
        -
          - type: section
            name: "Making the Sauce"
          - type: text
            value: " "
        -
          - type: note
            value: "This sauce is best made the day before."
        -
          - type: text
            value: "Simmer "
          - type: ingredient
            name: "tomatoes"
            quantity: 400
            units: "g"
          - type: text
            value: " in "
          - type: cookware
            name: "pot"
            quantity: 1
          - type: text
            value: "."
      metadata: {}

  # ==========================================
  # Fixed Quantities =quantity
  # ==========================================

  testFixedQuantitySimple:
    source: |
      Add @salt{=1%tsp} to the dough.
    result:
      steps:
        -
          - type: text
            value: "Add "
          - type: ingredient
            name: "salt"
            quantity: 1
            units: "tsp"
            fixed: true
          - type: text
            value: " to the dough."
      metadata: {}

  testFixedQuantityNoUnit:
    source: |
      Use @yeast{=1} packet.
    result:
      steps:
        -
          - type: text
            value: "Use "
          - type: ingredient
            name: "yeast"
            quantity: 1
            units: ""
            fixed: true
          - type: text
            value: " packet."
      metadata: {}

  testFixedQuantityMixed:
    source: |
      Mix @flour{500%g} with @water{300%ml} and @salt{=1%tsp}.
    result:
      steps:
        -
          - type: text
            value: "Mix "
          - type: ingredient
            name: "flour"
            quantity: 500
            units: "g"
          - type: text
            value: " with "
          - type: ingredient
            name: "water"
            quantity: 300
            units: "ml"
          - type: text
            value: " and "
          - type: ingredient
            name: "salt"
            quantity: 1
            units: "tsp"
            fixed: true
          - type: text
            value: "."
      metadata: {}

  testFixedQuantityDecimal:
    source: |
      Add @baking powder{=0.5%tsp} to the mix.
    result:
      steps:
        -
          - type: text
            value: "Add "
          - type: ingredient
            name: "baking powder"
            quantity: 0.5
            units: "tsp"
            fixed: true
          - type: text
            value: " to the mix."
      metadata: {}

  # ==========================================
  # Optional Ingredients @?
  # ==========================================

  testOptionalIngredientSimple:
    source: |
      Add @?thyme{2%sprigs} if desired.
    result:
      steps:
        -
          - type: text
            value: "Add "
          - type: ingredient
            name: "thyme"
            quantity: 2
            units: "sprigs"
            optional: true
          - type: text
            value: " if desired."
      metadata: {}

  testOptionalIngredientNoQuantity:
    source: |
      Garnish with @?parsley.
    result:
      steps:
        -
          - type: text
            value: "Garnish with "
          - type: ingredient
            name: "parsley"
            quantity: "some"
            units: ""
            optional: true
          - type: text
            value: "."
      metadata: {}

  testOptionalIngredientWithFixed:
    source: |
      Add @?salt{=1%pinch} to taste.
    result:
      steps:
        -
          - type: text
            value: "Add "
          - type: ingredient
            name: "salt"
            quantity: 1
            units: "pinch"
            optional: true
            fixed: true
          - type: text
            value: " to taste."
      metadata: {}

  testOptionalAndRegularMixed:
    source: |
      Mix @flour{500%g} with @water{300%ml} and @?herbs{}.
    result:
      steps:
        -
          - type: text
            value: "Mix "
          - type: ingredient
            name: "flour"
            quantity: 500
            units: "g"
          - type: text
            value: " with "
          - type: ingredient
            name: "water"
            quantity: 300
            units: "ml"
          - type: text
            value: " and "
          - type: ingredient
            name: "herbs"
            quantity: "some"
            units: ""
            optional: true
          - type: text
            value: "."
      metadata: {}

  testOptionalIngredientMultiWord:
    source: |
      Add @?fresh thyme{1%sprig} for aroma.
    result:
      steps:
        -
          - type: text
            value: "Add "
          - type: ingredient
            name: "fresh thyme"
            quantity: 1
            units: "sprig"
            optional: true
          - type: text
            value: " for aroma."
      metadata: {}

  testOptionalIngredientAsText:
    source: |
      Use @? as a placeholder.
    result:
      steps:
        -
          - type: text
            value: "Use @? as a placeholder."
      metadata: {}

  # ==========================================
  # Backslash Line Breaks
  # ==========================================
  # A backslash (\) at the end of a line forces a line break within
  # the same step, instead of collapsing to a space.

  testBackslashLineBreakSimple:
    source: "First line\\\nSecond line"
    result:
      steps:
        -
          - type: text
            value: "First line"
          - type: text
            value: "\n"
          - type: text
            value: "Second line"
      metadata: {}

  testBackslashLineBreakWithIngredients:
    source: "Lay out the @rice paper{1}.\\\nTop with @avocado{1/2}."
    result:
      steps:
        -
          - type: text
            value: "Lay out the "
          - type: ingredient
            name: "rice paper"
            quantity: 1
            units: ""
          - type: text
            value: "."
          - type: text
            value: "\n"
          - type: text
            value: "Top with "
          - type: ingredient
            name: "avocado"
            quantity: 0.5
            units: ""
          - type: text
            value: "."
      metadata: {}

  testBackslashLineBreakMultiple:
    source: "Line one\\\nLine two\\\nLine three"
    result:
      steps:
        -
          - type: text
            value: "Line one"
          - type: text
            value: "\n"
          - type: text
            value: "Line two"
          - type: text
            value: "\n"
          - type: text
            value: "Line three"
      metadata: {}

  testBackslashLineBreakCRLF:
    source: "First line\\\r\nSecond line"
    result:
      steps:
        -
          - type: text
            value: "First line"
          - type: text
            value: "\n"
          - type: text
            value: "Second line"
      metadata: {}

  testBackslashLineBreakNotAtEOL:
    source: |
      Use a back\slash in the middle.
    result:
      steps:
        -
          - type: text
            value: "Use a back\\slash in the middle."
      metadata: {}

  testBackslashLineBreakWithSpacesBeforeNewline:
    source: "Trailing spaces\\  \nNext line"
    result:
      steps:
        -
          - type: text
            value: "Trailing spaces"
          - type: text
            value: "\n"
          - type: text
            value: "Next line"
      metadata: {}

  testBackslashLineBreakAtEndOfInput:
    source: "End of input\\"
    result:
      steps:
        -
          - type: text
            value: "End of input\\"
      metadata: {}

  testBackslashLineBreakWithSections:
    source: "= Prep =\nStep one\\\nStep two"
    result:
      steps:
        -
          - type: section
            name: "Prep"
          - type: text
            value: " Step one"
          - type: text
            value: "\n"
          - type: text
            value: "Step two"
      metadata: {}

  # ==========================================
  # Recipe References @./path/to/recipe{qty}
  # ==========================================
  # References to other .cook files as ingredients.
  # Path is relative to recipe root, without the .cook extension.

  testRecipeReferenceSimple:
    source: |
      Pour over with @./sauces/Hollandaise{150%g}.
    result:
      steps:
        -
          - type: text
            value: "Pour over with "
          - type: recipeReference
            name: "./sauces/Hollandaise"
            quantity: 150
            units: "g"
          - type: text
            value: "."
      metadata: {}

  testRecipeReferenceNoQuantity:
    source: |
      Serve with @./sides/green salad{}.
    result:
      steps:
        -
          - type: text
            value: "Serve with "
          - type: recipeReference
            name: "./sides/green salad"
            quantity: "some"
            units: ""
          - type: text
            value: "."
      metadata: {}

  testRecipeReferenceNoUnit:
    source: |
      Make @./bread{2} batches.
    result:
      steps:
        -
          - type: text
            value: "Make "
          - type: recipeReference
            name: "./bread"
            quantity: 2
            units: ""
          - type: text
            value: " batches."
      metadata: {}

  testRecipeReferenceServings:
    source: |
      Prepare @./pasta carbonara{4%servings} for dinner.
    result:
      steps:
        -
          - type: text
            value: "Prepare "
          - type: recipeReference
            name: "./pasta carbonara"
            quantity: 4
            units: "servings"
          - type: text
            value: " for dinner."
      metadata: {}

  testRecipeReferenceNestedPath:
    source: |
      Add @./mains/pasta/carbonara{2%servings} to the menu.
    result:
      steps:
        -
          - type: text
            value: "Add "
          - type: recipeReference
            name: "./mains/pasta/carbonara"
            quantity: 2
            units: "servings"
          - type: text
            value: " to the menu."
      metadata: {}

  testRecipeReferenceWithText:
    source: |
      Mix @flour{500%g} and top with @./sauces/tomato{100%ml}.
    result:
      steps:
        -
          - type: text
            value: "Mix "
          - type: ingredient
            name: "flour"
            quantity: 500
            units: "g"
          - type: text
            value: " and top with "
          - type: recipeReference
            name: "./sauces/tomato"
            quantity: 100
            units: "ml"
          - type: text
            value: "."
      metadata: {}

  testRecipeReferenceMultiple:
    source: |
      Serve @./mains/chicken stir fry{4%servings} with @./sides/steamed rice{4%servings}.
    result:
      steps:
        -
          - type: text
            value: "Serve "
          - type: recipeReference
            name: "./mains/chicken stir fry"
            quantity: 4
            units: "servings"
          - type: text
            value: " with "
          - type: recipeReference
            name: "./sides/steamed rice"
            quantity: 4
            units: "servings"
          - type: text
            value: "."
      metadata: {}

  testRecipeReferenceUnitsScaling:
    source: |
      Pour @./sauces/hollandaise{150%ml} over the dish.
    result:
      steps:
        -
          - type: text
            value: "Pour "
          - type: recipeReference
            name: "./sauces/hollandaise"
            quantity: 150
            units: "ml"
          - type: text
            value: " over the dish."
      metadata: {}

  testRecipeReferenceParentPath:
    source: |
      Use @../shared/stock{500%ml} as the base.
    result:
      steps:
        -
          - type: text
            value: "Use "
          - type: recipeReference
            name: "../shared/stock"
            quantity: 500
            units: "ml"
          - type: text
            value: " as the base."
      metadata: {}

  testRecipeReferenceFactorOnly:
    source: |
      Make double @./bread{2}.
    result:
      steps:
        -
          - type: text
            value: "Make double "
          - type: recipeReference
            name: "./bread"
            quantity: 2
            units: ""
          - type: text
            value: "."
      metadata: {}
